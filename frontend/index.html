<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Léa Beauté Valognes - Institut de Beauté" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Léa Beauté - Institut de Beauté</title>
  </head>
  <body>
    <noscript>JavaScript doit être activé pour afficher ce site.</noscript>
    <div id="root"></div>
    <a
      id="htag-badge"
      target="_blank"
      href="https://htagfacility.fr"
      style="
        display: inline-flex !important;
        box-sizing: border-box;
        width: 178px;
        height: 40px;
        padding: 8px 12px;
        align-items: center !important;
        gap: 8px;
        border-radius: 50px !important;
        background: #000 !important;
        position: fixed !important;
        bottom: 16px;
        right: 16px;
        text-decoration: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif !important;
        font-size: 12px !important;
        z-index: 9999 !important;
      "
    >
      <span
        style="
          display: inline-flex !important;
          width: 26px;
          height: 26px;
          align-items: center !important;
          justify-content: center !important;
          border-radius: 9999px !important;
          background: #fff !important;
          flex: 0 0 26px;
          overflow: hidden !important;
        "
      >
        <img
          src="./HTAG.svg"
          alt=""
          aria-hidden="true"
          style="
            width: 16px;
            height: 16px;
            display: block;
            object-fit: contain;
          "
        />
      </span>
      <p
        style="
          color: #fff !important;
          font-family: 'Inter', sans-serif !important;
          font-size: 13px !important;
          font-style: normal !important;
          font-weight: 600 !important;
          line-height: 20px !important;
          margin: 0 !important;
          white-space: nowrap !important;
        "
      >
        Made by htagfacility
      </p>
    </a>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
